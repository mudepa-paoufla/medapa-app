<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pr:#1565C0;--prd:#0D47A1;--prl:#E3F2FD;
  --rd:#C62828;--rdl:#FFEBEE;--am:#F9A825;--aml:#FFF8E1;
  --gn:#2E7D32;--gnl:#E8F5E9;--gy:#607D8B;--gyl:#ECEFF1;
  --bg:#F0F4F8;--wh:#FFF;--tx:#1A237E;--tb:#37474F;--tm:#78909C;
  --sh:0 2px 8px rgba(21,101,192,.15);--shl:0 4px 20px rgba(21,101,192,.2);
  --r:10px;--rs:6px;--fn:'Nunito',sans-serif;--sw:240px;--th:60px;
}
html,body{font-family:var(--fn);background:var(--bg);color:var(--tb);min-height:100vh;overflow-x:hidden}

/* LOADING SCREEN */
#loading{position:fixed;inset:0;background:linear-gradient(135deg,var(--prd),var(--pr));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:16px}
#loading.hide{display:none}
.ld-logo{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.95)}}
.ld-bar{width:200px;height:4px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:#fff;border-radius:2px;animation:fill 2s ease-in-out infinite}
@keyframes fill{0%{width:0%}100%{width:100%}}
.ld-txt{font-size:14px;font-weight:600;opacity:.9}

/* SYNC INDICATOR */
#sync-badge{position:fixed;bottom:60px;left:14px;z-index:300;background:var(--wh);border-radius:20px;padding:5px 10px;font-size:11px;font-weight:700;box-shadow:var(--sh);display:flex;align-items:center;gap:5px;transition:.3s;cursor:pointer}
#sync-badge:hover{opacity:.85}
#sync-badge.synced{color:var(--gn)}
#sync-badge.syncing{color:var(--am)}
#sync-badge.offline{color:var(--rd)}
.btn-aide{background:var(--am);color:#333;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.btn-aide:hover{background:#e6971f;transform:scale(1.1)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.sync-dot.spin{animation:spin .8s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

#sb{width:var(--sw);background:var(--prd);color:#fff;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:left .3s;overflow-y:auto;display:flex;flex-direction:column}
.sb-hd{padding:13px;background:rgba(0,0,0,.2);display:flex;align-items:center;gap:9px;min-height:68px;flex-shrink:0}
.sb-ti{font-size:11px;font-weight:800;color:#fff;line-height:1.3}
.sb-ti span{color:var(--am);font-size:14px;display:block}
.ns{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.ns-t{font-size:9px;font-weight:700;color:rgba(255,255,255,.45);padding:5px 13px 2px;text-transform:uppercase;letter-spacing:.8px}
.ni{display:flex;align-items:center;gap:8px;padding:10px 13px;cursor:pointer;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.85);transition:.2s;border-left:3px solid transparent;white-space:nowrap;overflow:hidden}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.on{background:rgba(255,255,255,.15);color:#fff;border-left-color:var(--am)}
.ni i{width:17px;text-align:center;font-size:12px;flex-shrink:0}
.nbg{background:var(--rd);color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;margin-left:auto;flex-shrink:0}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
#ov.show{display:block}
#tb{position:fixed;top:0;right:0;left:var(--sw);height:var(--th);background:var(--wh);border-bottom:2px solid var(--prl);display:flex;align-items:center;padding:0 14px;gap:8px;z-index:99;box-shadow:var(--sh);transition:left .3s}
#mb-btn{background:none;border:none;font-size:19px;cursor:pointer;color:var(--pr);padding:5px;flex-shrink:0}
.tb-ti{font-size:14px;font-weight:800;color:var(--pr);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-u{display:flex;align-items:center;gap:5px;flex-shrink:0}
.uav{width:30px;height:30px;background:var(--pr);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.btn-lo{background:var(--rdl);color:var(--rd);border:none;padding:4px 9px;border-radius:var(--rs);cursor:pointer;font-size:11px;font-weight:700}
#ct{margin-left:var(--sw);margin-top:var(--th);padding:14px;transition:margin-left .3s}
.card{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-bottom:13px}
.ch{display:flex;align-items:center;gap:7px;margin-bottom:12px;padding-bottom:9px;border-bottom:2px solid var(--prl);flex-wrap:wrap}
.ch h2{font-size:14px;font-weight:800;color:var(--pr)}
.ch i{color:var(--pr);font-size:15px;flex-shrink:0}
.ch .ax{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:14px}
.sc{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:11px;display:flex;align-items:center;gap:9px;border-left:4px solid var(--pr);overflow:hidden;min-width:0}
.sc.rd{border-left-color:var(--rd)}.sc.gn{border-left-color:var(--gn)}.sc.am{border-left-color:var(--am)}.sc.gy{border-left-color:var(--gy)}
.si{width:38px;height:38px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--prl);color:var(--pr)}
.sc.rd .si{background:var(--rdl);color:var(--rd)}.sc.gn .si{background:var(--gnl);color:var(--gn)}.sc.am .si{background:var(--aml);color:var(--am)}.sc.gy .si{background:var(--gyl);color:var(--gy)}
.sif{flex:1;min-width:0;overflow:hidden}
.sl{font-size:9px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.3px;line-height:1.3;word-break:break-word}
.sv{font-size:17px;font-weight:800;color:var(--tx);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--rs);border:none;cursor:pointer;font-family:var(--fn);font-size:12px;font-weight:700;transition:.2s;white-space:nowrap}
.btn:hover{opacity:.87;transform:translateY(-1px)}
.bp{background:var(--pr);color:#fff}.br{background:var(--rd);color:#fff}.bg{background:var(--gn);color:#fff}
.ba{background:var(--am);color:#333}.bo{background:transparent;color:var(--pr);border:2px solid var(--pr)}
.bgy{background:var(--gyl);color:var(--gy)}.bw{background:#25D366;color:#fff}
.bs{padding:4px 8px;font-size:11px}.bi{padding:5px}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.fm{display:flex;flex-direction:column;gap:3px}
label{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{border:2px solid var(--gyl);border-radius:var(--rs);padding:7px 10px;font-family:var(--fn);font-size:13px;color:var(--tb);transition:.2s;width:100%;background:var(--wh)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pr);box-shadow:0 0 0 3px var(--prl)}
input:disabled,select:disabled{background:#F8F9FA;cursor:not-allowed;color:var(--tm)}
textarea{resize:vertical;min-height:55px}
.ig{position:relative;display:flex}
.ig input{flex:1;border-radius:var(--rs) 0 0 var(--rs)}
.ig .tpw{border:2px solid var(--gyl);border-left:none;border-radius:0 var(--rs) var(--rs) 0;background:var(--gyl);color:var(--gy);padding:0 9px;cursor:pointer;font-size:12px;display:flex;align-items:center}
.tw{overflow-x:auto;border-radius:var(--r);border:2px solid var(--gyl)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--pr);color:#fff}
th{padding:8px 9px;text-align:left;font-weight:700;font-size:10px;white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid var(--gyl);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:nth-child(even){background:#FAFBFF}
tr:hover td{background:var(--prl)}
.bx{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.bx-g{background:var(--gnl);color:var(--gn)}.bx-r{background:var(--rdl);color:var(--rd)}
.bx-a{background:var(--aml);color:#E65100}.bx-y{background:var(--gyl);color:var(--gy)}
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;padding:12px}
#mo.open{display:flex}
.modal{background:var(--wh);border-radius:var(--r);box-shadow:var(--shl);max-width:660px;width:100%;max-height:92vh;overflow-y:auto;animation:mIn .2s ease}
@keyframes mIn{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.mh{padding:13px 16px;display:flex;align-items:center;gap:7px;background:var(--pr);color:#fff;border-radius:var(--r) var(--r) 0 0;position:sticky;top:0;z-index:1}
.mh h3{font-size:14px;font-weight:800;flex:1}
.mb2{padding:16px}.mf{padding:11px 16px;border-top:2px solid var(--gyl);display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;position:sticky;bottom:0;background:var(--wh);z-index:1}
#toast{position:fixed;bottom:14px;right:14px;z-index:999;display:flex;flex-direction:column;gap:5px;max-width:calc(100vw - 28px)}
.ti{background:var(--wh);border-radius:var(--rs);box-shadow:var(--shl);padding:9px 13px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;border-left:4px solid var(--gn);animation:sIn .3s ease}
.ti.er{border-left-color:var(--rd)}.ti.wn{border-left-color:var(--am)}
@keyframes sIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
#lp{display:none;position:fixed;inset:0;background:linear-gradient(135deg,var(--prd) 0%,var(--pr) 100%);align-items:center;justify-content:center;z-index:999;padding:14px}
#lp.show{display:flex}
.lb{background:var(--wh);border-radius:16px;padding:26px;width:100%;max-width:370px;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.ll{text-align:center;margin-bottom:14px}
.lt{text-align:center;font-size:19px;font-weight:900;color:var(--pr);margin-bottom:2px}
.ls{text-align:center;font-size:11px;color:var(--tm);margin-bottom:18px}
.lb .fm{margin-bottom:11px}
.lbtn{width:100%;padding:10px;font-size:14px;margin-top:5px;justify-content:center}
.le{background:var(--rdl);color:var(--rd);padding:8px;border-radius:var(--rs);font-size:12px;font-weight:600;margin-bottom:9px;display:none}
.stit{font-size:12px;font-weight:800;color:var(--pr);margin:12px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--prl)}
.al{padding:9px 12px;border-radius:var(--rs);font-size:12px;font-weight:600;margin-bottom:11px}
.al-i{background:var(--prl);color:var(--pr)}.al-w{background:var(--aml);color:#E65100;border-left:4px solid var(--am)}
.al-s{background:var(--gnl);color:var(--gn);border-left:4px solid var(--gn)}
.tot{background:var(--prl);padding:8px 11px;border-radius:var(--rs);font-size:11px;font-weight:700;color:var(--pr);display:flex;gap:14px;flex-wrap:wrap;margin-top:9px}
.tot b{color:var(--rd)}
.sb2{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.sb2 input{max-width:230px;flex:1}
.es{text-align:center;padding:26px 14px;color:var(--tm)}
.es i{font-size:36px;opacity:.3;display:block;margin-bottom:9px}
input[type=file]{display:none}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.ac{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:11px;text-align:center;transition:.2s}
.ac:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.ap{width:56px;height:56px;border-radius:50%;object-fit:cover;border:3px solid var(--prl);margin:0 auto 6px}
.aph{width:56px;height:56px;border-radius:50%;background:var(--prl);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 6px}
.phb{width:96px;height:115px;background:var(--gyl);border-radius:var(--rs);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--tm);cursor:pointer;border:2px dashed var(--gy);font-size:10px;font-weight:600}
.phb i{font-size:22px}
.phi{width:96px;height:115px;object-fit:cover;border-radius:var(--rs);border:3px solid var(--prl)}
.j3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.jc{border-radius:var(--r);overflow:hidden;border:2px solid var(--gyl)}
.jch{padding:8px;text-align:center;font-weight:800;font-size:10px;color:#fff}
.jch.bl{background:var(--pr)}.jch.gn{background:var(--gn)}.jch.rd{background:var(--rd)}
.jct{padding:6px 9px;text-align:right;font-weight:800;font-size:11px}
.jct.bl{background:var(--prl);color:var(--pr)}.jct.gn{background:var(--gnl);color:var(--gn)}.jct.rd{background:var(--rdl);color:var(--rd)}
.jgt{background:var(--prd);color:#fff;padding:9px 12px;border-radius:var(--rs);display:flex;gap:14px;flex-wrap:wrap;font-size:11px;font-weight:700;margin-top:9px}
.jgt span{color:var(--am)}
.cw{position:relative;height:190px;margin-top:9px}
.cei{background:var(--wh);border:2px solid var(--gyl);border-radius:var(--r);padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:11px}
.cei:hover,.cei.on{border-color:var(--pr);background:var(--prl)}
.cen{width:34px;height:34px;background:var(--am);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#333;flex-shrink:0}
.cei-i{flex:1;min-width:0}
.cei-m{font-weight:800;font-size:12px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cei-s{font-size:10px;color:var(--tm)}
.mc{width:322px;height:204px;background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff;border-radius:10px;padding:12px;display:flex;gap:10px;font-family:var(--fn);box-shadow:0 4px 16px rgba(21,101,192,.3);flex-shrink:0}
@media print{#sb,#tb,#toast,.np,#ov,#sync-badge{display:none!important}#ct{margin:0!important;padding:0!important}body{background:#fff}}
@media(max-width:768px){
  #sb{left:calc(-1 * var(--sw))}#sb.mo{left:0}
  #tb{left:0!important}#ct{margin-left:0!important;padding:10px}
  .sg{grid-template-columns:1fr 1fr}.fg{grid-template-columns:1fr}
  .j3{grid-template-columns:1fr}.modal{max-width:100%;max-height:94vh}
}
@media(min-width:769px){#sb{left:0}#sb.dh{left:calc(-1 * var(--sw))}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="ld-logo" id="ld-logo"></div>
  <div style="font-size:20px;font-weight:900">MUDEPA</div>

  <div class="sync-dot" id="sync-dot"></div>

</div>

<!-- LOGIN -->
<div id="lp" class="show" style="display:none">
  <div class="lb">
    <div class="ll" id="ll"></div>

      <div class="ig"><input type="password" id="lip" placeholder="Votre mot de passe" autocomplete="current-password">

<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyBtTmqRgrrI1EBKzhImaxKcTfFaPv3djAw",
  authDomain: "mudepa-paoufla-5cd1c.firebaseapp.com",
  projectId: "mudepa-paoufla-5cd1c",
  storageBucket: "mudepa-paoufla-5cd1c.firebasestorage.app",
  messagingSenderId: "265500055335",
  appId: "1:265500055335:web:4d83253bb75c77787dfb02"
};
firebase.initializeApp(firebaseConfig);
const FSdb = firebase.firestore();

// ============================================================
// CONSTANTES
// ============================================================
const ROLES={A:'administrateur',T:'trésorier',P:'président',C:'contrôleur',M:'membre'};
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const FONCTIONS=['Président','Vice-président','Secrétaire général','Secrétaire général adjoint','Président de commission','Membre','Autre'];
const SITUATIONS=['Marié(e)','Célibataire','Concubinage','Veuf','Veuve'];
const MOTIFS_X=['Cotisation Exceptionnelle','Décès','Don','Sortie Détente','Mariage','Autres'];
const SRC_R=['Banque','Don','Prêt','Leg','Autre Recette'];
const CUR='XOF';
const COLLECTIONS=['membres','cm','cx','rc','dp','os','users'];

let ST={user:null,view:'dashboard',p:{},sd:true};
let CI=null;
let CACHE={membres:[],cm:[],cx:[],rc:[],dp:[],users:[],la:{}};

// ============================================================
// SYNC INDICATOR
// ============================================================
function setSyncStatus(status){
  const badge=document.getElementById('sync-badge');
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-txt');
  badge.className='';
  dot.className='sync-dot';
  if(status==='syncing'){badge.classList.add('syncing');dot.classList.add('spin');txt.textContent='Synchronisation...';}
  else if(status==='offline'){badge.classList.add('offline');txt.textContent='Hors ligne';}
  else{badge.classList.add('synced');txt.textContent='Synchronisé';}
}

// ============================================================
// DATABASE FIREBASE
// ============================================================
const DB={
  g(k){return CACHE[k]||null;},

  s(k,v){
    CACHE[k]=v;
    // Toujours sauvegarder localement
    try{localStorage.setItem('md_'+k,JSON.stringify(v));}catch(e){}
    if(k==='la')return; // login_attempts reste local uniquement
    // Marquer comme "à synchroniser"
    DB.addToQueue(k);
    // Tenter la sync Firebase immédiatement
    DB.pushToFirebase(k,v);
  },

  // Ajoute une clé à la file d'attente de sync
  addToQueue(k){
    try{
      const q=JSON.parse(localStorage.getItem('md_sync_queue')||'[]');
      if(!q.includes(k))q.push(k);
      localStorage.setItem('md_sync_queue',JSON.stringify(q));
    }catch(e){}
  },

  // Retire une clé de la file d'attente
  removeFromQueue(k){
    try{
      const q=JSON.parse(localStorage.getItem('md_sync_queue')||'[]');
      localStorage.setItem('md_sync_queue',JSON.stringify(q.filter(x=>x!==k)));
    }catch(e){}
  },

  // Envoi vers Firebase
  pushToFirebase(k,v){
    setSyncStatus('syncing');
    FSdb.collection('mudepa').doc(k).set({
      data:JSON.stringify(v),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(()=>{
      DB.removeFromQueue(k);
      setSyncStatus('synced');
    })
    .catch(e=>{
      console.warn('Sync différé pour',k,e.message);
      setSyncStatus('offline');
    });
  },

  // Synchronise toutes les données en attente (appelé au retour internet)
  async flushQueue(){
    const q=JSON.parse(localStorage.getItem('md_sync_queue')||'[]');
    if(!q.length)return;
    toast('Connexion rétablie — synchronisation en cours...','wn');
    setSyncStatus('syncing');
    let ok=0,fail=0;
    for(const k of q){
      const v=CACHE[k];
      if(!v)continue;
      try{
        await FSdb.collection('mudepa').doc(k).set({
          data:JSON.stringify(v),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        DB.removeFromQueue(k);
        ok++;
      }catch(e){
        fail++;
        console.error('Flush error for',k,e);
      }
    }
    if(fail===0){
      setSyncStatus('synced');
      toast(`✅ ${ok} collection(s) synchronisée(s) avec Firebase !`);
    } else {
      setSyncStatus('offline');
      toast(`⚠️ ${ok} synchronisée(s), ${fail} en attente`,'wn');
    }
  },

  // Charge les données locales immédiatement
  loadLocal(){
    for(const k of COLLECTIONS){
      const local=localStorage.getItem('md_'+k);
      CACHE[k]=local?JSON.parse(local):(k==='la'?{}:[]);
    }
    const la=localStorage.getItem('md_la');
    CACHE['la']=la?JSON.parse(la):{};
    if(!(CACHE['users']||[]).length){
      CACHE['users']=[{id:'u001',login:'admin',password:'Admin2026',role:ROLES.A,memberId:null,active:true}];
    }
  },

  // Sync Firebase avec timeout 4s
  async syncFromFirebase(){
    setSyncStatus('syncing');
    const timeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),10000)); // 10s pour réseaux mobiles
    try{
      await Promise.race([
        (async()=>{
          for(const k of COLLECTIONS){
            const doc=await FSdb.collection('mudepa').doc(k).get();
            if(doc.exists&&doc.data()&&doc.data().data){
              const remote=JSON.parse(doc.data().data);
              const local=CACHE[k];
              const remoteLen=Array.isArray(remote)?remote.length:0;
              const localLen=Array.isArray(local)?local.length:0;
              if(remoteLen>=localLen){
                CACHE[k]=remote;
                localStorage.setItem('md_'+k,JSON.stringify(remote));
              } else if(!Array.isArray(remote)){
                CACHE[k]=remote;
                localStorage.setItem('md_'+k,JSON.stringify(remote));
              }
            } else {
              if(CACHE[k]&&(Array.isArray(CACHE[k])?CACHE[k].length>0:true)){
                await FSdb.collection('mudepa').doc(k).set({data:JSON.stringify(CACHE[k]),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
              }
            }
          }
        })(),
        timeout
      ]);
      setSyncStatus('synced');
    } catch(e){
      setSyncStatus('offline');
      if(e.message==='timeout') toast('Mode hors ligne — données locales utilisées','wn');
      else console.error('Firebase sync error:',e);
    }
  },

  async loadAll(){
    // 1. Données locales d'abord = démarrage immédiat même sans internet
    DB.loadLocal();
    // 2. Sync Firebase en arrière-plan (silencieux si pas internet)
    await DB.syncFromFirebase();
  },

  listenAll(){
    COLLECTIONS.forEach(k=>{
      FSdb.collection('mudepa').doc(k).onSnapshot(doc=>{
        if(doc.exists&&doc.data().data){
          const newData=JSON.parse(doc.data().data);
          const changed=JSON.stringify(newData)!==JSON.stringify(CACHE[k]);
          CACHE[k]=newData;
          if(changed&&ST.user){
            setSyncStatus('synced');
            renderView();
            renderNav();
          }
        }
      },err=>{
        console.warn('Listener error:',err);
        setSyncStatus('offline');
      });
    });
  }
};

// Compression image
function compressImage(dataUrl,maxW=150,maxH=180,quality=0.5){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.src=dataUrl;
  });
}

function doLogin(){
  const login=$('liu').value.trim(),pass=$('lip').value;
  $('le').style.display='none';
  if(!login||!pass){showLE('Remplissez tous les champs.');return;}
  const la=CACHE['la']||{},a=la[login]||{count:0};
  if(a.lockedUntil&&new Date()<new Date(a.lockedUntil)){
    showLE(`Bloqué ${Math.ceil((new Date(a.lockedUntil)-new Date())/60000)} min.`);return;
  }
  const u=(CACHE['users']||[]).find(u=>u.login===login&&u.password===pass&&u.active);
  if(!u){
    a.count=(a.count||0)+1;
    if(a.count>=3){a.lockedUntil=new Date(Date.now()+30*60000).toISOString();a.count=0;showLE('3 tentatives. Compte bloqué 30 min.');}
    else showLE(`Identifiant ou mot de passe incorrect. (${a.count}/3)`);
    la[login]=a;CACHE['la']=la;localStorage.setItem('md_la',JSON.stringify(la));return;
  }
  delete la[login];CACHE['la']=la;localStorage.setItem('md_la',JSON.stringify(la));
  ST.user=u;$('lp').style.display='none';initApp();
}

// ============================================================
// INIT APP
// ============================================================
function initApp(){
  $('uav').textContent=ST.user.login[0].toUpperCase();
  if(window.innerWidth>768){$('tb').style.left='var(--sw)';$('ct').style.marginLeft='var(--sw)';}
  nav('dashboard');
}

function renderView(){
  const v=$('vw');if(!v)return;
  const views={
    dashboard:()=>{v.innerHTML=vDash();initChart();},
    ml:()=>v.innerHTML=vML(),mf:()=>v.innerHTML=vMF(),mv:()=>v.innerHTML=vMV(),
    cm:()=>v.innerHTML=vCM(),cx:()=>v.innerHTML=vCX(),
    cj:()=>v.innerHTML=vCJ(),cr:()=>v.innerHTML=vCR(),cd:()=>v.innerHTML=vCD(),
    ann:()=>v.innerHTML=vAnn(),adm:()=>v.innerHTML=vAdm(),
    ed:()=>v.innerHTML=vEd(),prf:()=>v.innerHTML=vPrf(),aide:()=>v.innerHTML=vAide(),os:()=>v.innerHTML=vOS()
  };
  (views[ST.view]||views.dashboard)();
}

// ============================================================
// DASHBOARD
// ============================================================
function vDash(){
  const mb=CACHE['membres']||[],cm=CACHE['cm']||[],rc=CACHE['rc']||[],dp=CACHE['dp']||[],cx=CACHE['cx']||[];
  const val=mb.filter(m=>m.statut==='validated').length,pend=mb.filter(m=>m.statut==='pending').length;
  const mats=new Set(mb.map(m=>m.matricule));
  const cmValid=cm.filter(c=>mats.has(c.matricule));
  const tCM=cmValid.reduce((s,c)=>s+Number(c.montant||0),0);
  let tCX=0;cx.forEach(ce=>(ce.participants||[]).filter(p=>mats.has(p.matricule)).forEach(p=>{tCX+=Number(p.montant||0);}));
  const tR=rc.reduce((s,r)=>s+Number(r.montant||0),0),tD=dp.reduce((s,d)=>s+Number(d.montant||0),0);
  let tOS=0;(CACHE['os']||[]).forEach(op=>(op.participants||[]).forEach(p=>{tOS+=Number(p.montant||0);}));
  const solde=tCM+tR+tOS-tD,y=cY(),tAn=cmValid.filter(c=>c.annee==y).reduce((s,c)=>s+Number(c.montant||0),0);
  if(isMb()){
    const mm=ST.user.memberId?gMb(ST.user.memberId):null;
    const myT=mm?cm.filter(c=>c.matricule===mm.matricule).reduce((s,c)=>s+Number(c.montant||0),0):0;
    return `<div class="sg">
    <div class="sc gn"><div class="si"><i class="fas fa-user-check"></i></div><div class="sif"><div class="sl">Statut</div><div style="margin-top:2px">${mm?`<span class="bx bx-${mm.statut==='validated'?'g':'a'}">${mm.statut==='validated'?'Validé':'Attente'}</span>`:'—'}</div></div></div>
    <div class="sc"><div class="si"><i class="fas fa-id-card"></i></div><div class="sif"><div class="sl">Matricule</div><div class="sv" style="font-size:13px">${mm?mm.matricule:'—'}</div></div></div>
    <div class="sc am"><div class="si"><i class="fas fa-money-bill"></i></div><div class="sif"><div class="sl">Mes cotisations</div><div class="sv" style="font-size:12px">${fmt(myT)}</div></div></div>
    </div><div class="card"><div class="ch"><i class="fas fa-info-circle"></i><h2>Bienvenue MUDEPA</h2></div>
    <p style="font-size:12px">Bonjour <b>${ST.user.login}</b>. ${mm?`Fiche ${mm.statut==='validated'?'<b style="color:var(--gn)">validée</b>.':'<b style="color:var(--am)">en attente de validation</b>.'}`:''}</p></div>`;
  }
  return `<div class="sg">
  <div class="sc gn"><div class="si"><i class="fas fa-user-check"></i></div><div class="sif"><div class="sl">Membres validés</div><div class="sv">${val}</div></div></div>
  <div class="sc am"><div class="si"><i class="fas fa-user-clock"></i></div><div class="sif"><div class="sl">En attente valid.</div><div class="sv">${pend}</div></div></div>
  <div class="sc gy"><div class="si"><i class="fas fa-users"></i></div><div class="sif"><div class="sl">Total enregistrés</div><div class="sv">${mb.length}</div></div></div>
  <div class="sc"><div class="si"><i class="fas fa-calendar-check"></i></div><div class="sif"><div class="sl">Cotis. mens. ${y}</div><div class="sv" style="font-size:12px">${fmt(tAn)}</div></div></div>
  <div class="sc am"><div class="si"><i class="fas fa-star"></i></div><div class="sif"><div class="sl">Cotis. except.</div><div class="sv" style="font-size:12px">${fmt(tCX)}</div></div></div>
  <div class="sc gn"><div class="si"><i class="fas fa-plus-circle"></i></div><div class="sif"><div class="sl">Recettes caisse</div><div class="sv" style="font-size:12px">${fmt(tR)}</div></div></div>

  const mat=m.matricule;
  // Suppression en cascade
  DB.s('membres',(CACHE['membres']||[]).filter(x=>x.id!==id));
  DB.s('cm',(CACHE['cm']||[]).filter(c=>c.matricule!==mat));
  const cx=(CACHE['cx']||[]).map(ce=>({...ce,participants:(ce.participants||[]).filter(p=>p.matricule!==mat)}));
  DB.s('cx',cx);
  toast('Membre '+mat+' et toutes ses données supprimés.');
  renderView();
}

function purgeOrphans(){

  const mats=new Set((CACHE['membres']||[]).map(m=>m.matricule));

}

function hdPh(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    const compressed=await compressImage(ev.target.result);
    $('ph-d').value=compressed;
    const p=$('ph-prev');if(p)p.outerHTML=`<img src="${compressed}" class="phi" id="ph-prev">`;
  };r.readAsDataURL(f);
}

function saveMb(e,id,fromProfile){
  e.preventDefault();const fd=new FormData(e.target);
  const mb=CACHE['membres']||[],ph=$('ph-d').value;
  const obj={nom:fd.get('nom'),prenom:fd.get('prenom'),sexe:fd.get('sexe'),dN:fd.get('dN'),lN:fd.get('lN'),quartier:fd.get('quartier'),residence:fd.get('residence'),fonction:fd.get('fonction'),profession:fd.get('profession'),sitMatri:fd.get('sitMatri'),nomConj:fd.get('nomConj'),whatsapp:fd.get('whatsapp'),contact2:fd.get('contact2'),email:fd.get('email')};
  if(id){
    const i=mb.findIndex(m=>m.id===id);if(i<0)return;
    // Si c'est un membre (non admin) qui modifie son propre profil → repasse en attente
    const isOwnEdit=isMb()&&(ST.user.memberId===id||ST.user.memberId===mb[i]?.matricule);
    const newStatut=isOwnEdit?'pending':mb[i].statut;
    mb[i]={...mb[i],...obj,photo:ph||mb[i].photo,statut:newStatut};
    DB.s('membres',mb);
    if(isOwnEdit&&newStatut==='pending'){
      toast('Profil modifié — en attente de validation par l\'administrateur.','wn');
      nav('dashboard');
    } else {
      toast('Mis à jour !');
      fromProfile==='true'?nav('prf'):nav('ml');
    }
  } else {
    const mat=gMat(),st=isA()?'validated':'pending';
    mb.push({id:uid(),matricule:mat,...obj,photo:ph,statut:st,dateEnreg:tdy()});
    DB.s('membres',mb);
    toast(`Enregistré ! Matricule: ${mat}${st==='pending'?' — En attente de validation':''}`);
    nav('ml');
  }
}

function saveRC(){

}
function delRC(id){if(!confirm('Supprimer ?'))return;DB.s('rc',(CACHE['rc']||[]).filter(r=>r.id!==id));toast('Supprimé.');renderView();}

function openNUModal(){
  const mb=(CACHE['membres']||[]).filter(m=>m.statut==='validated');
  openModal('Nouvel Utilisateur',`<div class="fg">
    <div class="fm"><label>Login *</label><input type="text" id="nu-l"></div>
    <div class="fm"><label>Mot de passe *</label><div class="ig"><input type="password" id="nu-p"><button type="button" class="tpw" onclick="tpw('nu-p',this)"><i class="fas fa-eye"></i></button></div></div>
    <div class="fm"><label>Rôle *</label><select id="nu-r"><option value="${ROLES.M}">Membre</option><option value="${ROLES.T}">Trésorier</option><option value="${ROLES.P}">Président</option><option value="${ROLES.C}">Contrôleur</option><option value="${ROLES.A}">Administrateur</option></select></div>
    <div class="fm"><label>Membre lié</label><select id="nu-mb"><option value="">— Aucun —</option>${mb.map(m=>`<option value="${m.matricule}">${m.matricule} – ${m.nom}</option>`).join('')}</select></div>
  </div>`,`<button class="btn bp" onclick="saveNU()"><i class="fas fa-save"></i> Créer</button><button class="btn bgy" onclick="closeModal()">Annuler</button>`);
}
function saveNU(){
  const l=$('nu-l').value.trim(),p=$('nu-p').value,r=$('nu-r').value,mb=$('nu-mb').value||null;
  if(!l||!p)return toast('Login et mot de passe requis','wn');
  const users=CACHE['users']||[];
  if(users.find(u=>u.login===l))return toast('Login déjà utilisé','er');
  users.push({id:uid(),login:l,password:p,role:r,memberId:mb,active:true});
  DB.s('users',users);toast('Utilisateur créé !');closeModal();renderView();
}
function openEUModal(id){
  const u=(CACHE['users']||[]).find(x=>x.id===id);if(!u)return;
  const mb=(CACHE['membres']||[]).filter(m=>m.statut==='validated');
  openModal('Modifier Utilisateur',`<div class="fg">
    <div class="fm"><label>Login</label><input type="text" id="eu-l" value="${u.login}"></div>
    <div class="fm"><label>Nouveau mot de passe</label><div class="ig"><input type="password" id="eu-p" placeholder="Laisser vide = inchangé"><button type="button" class="tpw" onclick="tpw('eu-p',this)"><i class="fas fa-eye"></i></button></div></div>
    <div class="fm"><label>Rôle</label><select id="eu-r"><option value="${ROLES.M}" ${u.role===ROLES.M?'selected':''}>Membre</option><option value="${ROLES.T}" ${u.role===ROLES.T?'selected':''}>Trésorier</option><option value="${ROLES.P}" ${u.role===ROLES.P?'selected':''}>Président</option><option value="${ROLES.C}" ${u.role===ROLES.C?'selected':''}>Contrôleur</option><option value="${ROLES.A}" ${u.role===ROLES.A?'selected':''}>Administrateur</option></select></div>
    <div class="fm"><label>Membre lié</label><select id="eu-mb"><option value="">— Aucun —</option>${mb.map(m=>`<option value="${m.matricule}" ${u.memberId===m.matricule?'selected':''}>${m.matricule} – ${m.nom}</option>`).join('')}</select></div>
  </div>`,`<button class="btn bp" onclick="saveEU('${id}')"><i class="fas fa-save"></i> Enregistrer</button><button class="btn bgy" onclick="closeModal()">Annuler</button>`);
}
function saveEU(id){
  const users=CACHE['users']||[],i=users.findIndex(u=>u.id===id);if(i<0)return;
  const np=$('eu-p').value;
  users[i]={...users[i],login:$('eu-l').value.trim(),role:$('eu-r').value,memberId:$('eu-mb').value||null,...(np?{password:np}:{})};
  DB.s('users',users);toast('Mis à jour !');closeModal();renderView();
}
function toggleU(id){
  const users=CACHE['users']||[],i=users.findIndex(u=>u.id===id);if(i<0)return;

function impData(e){
  const f=e.target.files[0];if(!f)return;
  if(!confirm('ATTENTION: Cela écrasera toutes les données actuelles. Continuer ?'))return;
  const r=new FileReader();
  r.onload=ev=>{try{
    const d=JSON.parse(ev.target.result);
    COLLECTIONS.forEach(k=>{if(d[k])DB.s(k,d[k]);});
    toast('Données importées et synchronisées !');renderView();renderNav();
  }catch(e){console.error(e);toast('Fichier invalide !','er');}};
  r.readAsText(f);e.target.value='';
}

function openWA(url){
  // Méthode la plus fiable : lien <a> avec target="_blank"
  // Ouvre WhatsApp dans une app/fenêtre séparée sans fermer la PWA
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => document.body.removeChild(a), 300);
}

    <td><input type="number" class="os-amt-r" data-r="${i}" value="${mt}" min="0" step="500" style="min-width:85px" oninput="updOSTot()"></td>
    <td><button type="button" class="btn br bs bi" onclick="rmOSR(${i})"><i class="fas fa-trash"></i></button></td>`;
  tb.appendChild(tr);updOSTot();
}
function rmOSR(i){const t=$('os-r-'+i);if(t)t.remove();updOSTot();}
function fillOS(i){
  const s=document.querySelector('.os-mat-r[data-r="'+i+'"]');if(!s)return;
  const m=gMb(s.value),n=document.querySelector('.os-nom-r[data-r="'+i+'"]');
  if(n)n.value=m?m.nom+' '+m.prenom:'';updOSTot();
}
function updOSMt(){const v=$('os-mt')?.value||0;document.querySelectorAll('.os-amt-r').forEach(i=>i.value=v);updOSTot();}
function updOSTot(){
  let t=0;document.querySelectorAll('.os-amt-r').forEach(i=>t+=parseFloat(i.value)||0);
  const e=$('os-tot');if(e)e.textContent='Total: '+fmt(t);
}
function getOSP(){
  return Array.from(document.querySelectorAll('#os-rows tr')).map(tr=>({
    matricule:tr.querySelector('.os-mat-r')?.value||'',
    nom:tr.querySelector('.os-nom-r')?.value||'',
    montant:parseFloat(tr.querySelector('.os-amt-r')?.value)||0,
    date:tr.querySelector('.os-dt-r')?.value||tdy()
  })).filter(p=>p.matricule);
}
function saveOS(eid){
  const mo=$('os-mo')?.value.trim();
  if(!mo)return toast('Saisissez un motif','wn');
  const list=CACHE['os']||[];
  const obj={id:eid||uid(),
    numero:eid?(list.find(x=>x.id===eid)||{}).numero||list.length+1:list.length+1,
    motif:mo,dateEvenement:$('os-dt').value,lieu:$('os-li').value,heure:$('os-he').value,
    montantParMembre:parseFloat($('os-mt').value)||0,participants:getOSP()};
  if(eid){const i=list.findIndex(x=>x.id===eid);if(i>=0)list[i]=obj;else list.push(obj);}
  else list.push(obj);
  DB.s('os',list);toast('Opération spéciale enregistrée !');
  ST.p.osNew=false;ST.p.osId=null;renderView();
}
function delOS(id){
  if(!confirm('Supprimer cette opération spéciale ?'))return;
  DB.s('os',(CACHE['os']||[]).filter(x=>x.id!==id));
  toast('Supprimé.');ST.p.osId=null;renderView();
}

function vOS(){
  const list=CACHE['os']||[],selId=ST.p.osId||null,showNew=ST.p.osNew===true;
  const sel=selId?list.find(x=>x.id===selId):null;
  const mb=(CACHE['membres']||[]).filter(m=>m.statut==='validated');
  let fH='';

  if((showNew||sel)&&canW()){
    const p=sel||{};
    fH='<div class="card" style="border:2px solid #7B1FA2">'
      +'<div class="ch" style="background:#F3E5F5"><i class="fas fa-hand-holding-usd" style="color:#7B1FA2"></i>'
      +'<h2 style="color:#7B1FA2">'+(sel?'Opération Spéciale N° '+p.numero:'Nouvelle Opération Spéciale')+'</h2>'
      +'<div class="ax"><button class="btn bgy bs" onclick="ST.p.osNew=false;ST.p.osId=null;renderView()"><i class="fas fa-times"></i> Fermer</button></div></div>'
      +'<div class="fg" style="margin-bottom:10px">'
        +'<div class="fm" style="grid-column:1/-1"><label>Motif * (saisie libre)</label>'
          +'<input type="text" id="os-mo" value="'+(p.motif||'')+'" placeholder="Ex: Solidarité mariage, Aide deuil, Financement voyage..."></div>'
        +'<div class="fm"><label>Date événement</label><input type="date" id="os-dt" value="'+(p.dateEvenement||tdy())+'"></div>'
        +'<div class="fm"><label>Lieu</label><input type="text" id="os-li" value="'+(p.lieu||'')+'"></div>'
        +'<div class="fm"><label>Heure</label><input type="time" id="os-he" value="'+(p.heure||'')+'"></div>'
        +'<div class="fm"><label>Montant/membre (XOF)</label><input type="number" id="os-mt" value="'+(p.montantParMembre||0)+'" min="0" step="500" oninput="updOSMt()"></div>'
      +'</div>'
      +'<div class="stit">Participation des membres</div>'
      +'<div class="tw" style="margin-bottom:9px"><table id="os-tbl"><thead>'
        +'<tr><th>#</th><th>Date</th><th>Matricule</th><th>Nom et Prénoms</th><th>Montant</th><th></th></tr>'
      +'</thead><tbody id="os-rows">';

    (p.participants||[]).forEach((pr,i)=>{
      fH+='<tr id="os-r-'+i+'">'
        +'<td>'+(i+1)+'</td>'
        +'<td><input type="date" class="os-dt-r" data-r="'+i+'" value="'+(pr.date||tdy())+'" style="min-width:105px"></td>'
        +'<td><select class="os-mat-r" data-r="'+i+'" onchange="fillOS('+i+')" style="min-width:105px"><option value="">—</option>'
          +mb.map(m=>'<option value="'+m.matricule+'"'+(pr.matricule===m.matricule?' selected':'')+'>'+m.matricule+'</option>').join('')
        +'</select></td>'
        +'<td><input type="text" class="os-nom-r" data-r="'+i+'" value="'+(pr.nom||'')+'" readonly style="min-width:130px;background:#f8f9fa"></td>'
        +'<td><input type="number" class="os-amt-r" data-r="'+i+'" value="'+(pr.montant||0)+'" min="0" step="500" style="min-width:85px" oninput="updOSTot()"></td>'
        +'<td><button type="button" class="btn br bs bi" onclick="rmOSR('+i+')"><i class="fas fa-trash"></i></button></td>'
      +'</tr>';
    });

    fH+='</tbody></table></div>'
      +'<div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:11px">'
        +'<button class="btn bs" style="background:#7B1FA2;color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:4px" onclick="addOSR()"><i class="fas fa-plus"></i> Ajouter membre</button>'
        +'<span id="os-tot" style="font-weight:800;color:#7B1FA2;margin-left:auto"></span>'
      +'</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
        +'<button class="btn bs" style="background:#7B1FA2;color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:4px" onclick="saveOS(\''+(sel?sel.id:'')+'\')"><i class="fas fa-save"></i> Enregistrer</button>'
        +'<button class="btn bgy" onclick="ST.p.osNew=false;ST.p.osId=null;renderView()">Annuler</button>'
      +'</div></div>';
  }

  // Liste des opérations
  const grandTot=list.reduce((s,op)=>s+(op.participants||[]).reduce((ss,p)=>ss+Number(p.montant||0),0),0);
  let lH='<div class="card"><div class="ch"><i class="fas fa-hand-holding-usd" style="color:#7B1FA2"></i><h2 style="color:#7B1FA2">Opérations Spéciales</h2>'
    +'<div class="ax">'+(canW()?'<button class="btn bs" style="background:#7B1FA2;color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:4px" onclick="ST.p.osNew=true;ST.p.osId=null;renderView()"><i class="fas fa-plus"></i> Nouvelle</button>':'')+'</div></div>';

  if(!list.length){
    lH+='<div class="es"><i class="fas fa-hand-holding-usd"></i>Aucune opération spéciale</div>';
  } else {
    list.forEach(op=>{
      const tot=(op.participants||[]).reduce((s,p)=>s+Number(p.montant||0),0);
      lH+='<div class="cei '+(selId===op.id?'on':'')+'" onclick="ST.p.osId=ST.p.osId===\''+op.id+'\' ?null:\''+op.id+'\';ST.p.osNew=false;renderView()">'
        +'<div class="cen" style="background:#7B1FA2;color:#fff">'+op.numero+'</div>'
        +'<div class="cei-i">'
          +'<div class="cei-m">'+op.motif+'</div>'
          +'<div class="cei-s">'+fD(op.dateEvenement)+(op.lieu?' | '+op.lieu:'')+' | '+(op.participants||[]).length+' membre(s)</div>'
        +'</div>'
        +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">'
          +'<div style="font-weight:800;font-size:12px;color:#7B1FA2">'+fmt(tot)+'</div>'
          +(canW()?'<div style="display:flex;gap:3px" onclick="event.stopPropagation()">'
            +'<button class="btn bo bs bi np" onclick="ST.p.osId=\''+op.id+'\';ST.p.osNew=false;renderView()"><i class="fas fa-edit"></i></button>'
            +(isA()?'<button class="btn br bs bi np" onclick="delOS(\''+op.id+'\')"><i class="fas fa-trash"></i></button>':'')
          +'</div>':'')
        +'</div>'
      +'</div>';
    });
    lH+='<div class="tot">Total général opérations spéciales: <b>'+fmt(grandTot)+'</b></div>';
  }
  lH+='</div>';
  return fH+lH;
}

function addOSR(){
  const mb=(CACHE['membres']||[]).filter(m=>m.statut==='validated');
  const tb=$('os-rows');if(!tb)return;
  const i=tb.children.length,mt=$('os-mt')?.value||0;
  const tr=document.createElement('tr');tr.id='os-r-'+i;
  tr.innerHTML='<td>'+(i+1)+'</td>'
    +'<td><input type="date" class="os-dt-r" data-r="'+i+'" value="'+tdy()+'" style="min-width:105px"></td>'
    +'<td><select class="os-mat-r" data-r="'+i+'" onchange="fillOS('+i+')" style="min-width:105px"><option value="">—</option>'
      +mb.map(m=>'<option value="'+m.matricule+'">'+m.matricule+'</option>').join('')
    +'</select></td>'
    +'<td><input type="text" class="os-nom-r" data-r="'+i+'" value="" readonly style="min-width:130px;background:#f8f9fa"></td>'
    +'<td><input type="number" class="os-amt-r" data-r="'+i+'" value="'+mt+'" min="0" step="500" style="min-width:85px" oninput="updOSTot()"></td>'
    +'<td><button type="button" class="btn br bs bi" onclick="rmOSR('+i+')"><i class="fas fa-trash"></i></button></td>';
  tb.appendChild(tr);updOSTot();
}

function rmOSR(i){const t=$('os-r-'+i);if(t)t.remove();updOSTot();}

function fillOS(i){
  const s=document.querySelector('.os-mat-r[data-r="'+i+'"]');if(!s)return;
  const m=gMb(s.value),n=document.querySelector('.os-nom-r[data-r="'+i+'"]');
  if(n)n.value=m?m.nom+' '+m.prenom:'';updOSTot();
}

function updOSMt(){
  const v=$('os-mt')?.value||0;
  document.querySelectorAll('.os-amt-r').forEach(i=>i.value=v);updOSTot();
}

function updOSTot(){
  let t=0;document.querySelectorAll('.os-amt-r').forEach(i=>t+=parseFloat(i.value)||0);
  const e=$('os-tot');if(e)e.textContent='Total: '+fmt(t);
}

function getOSP(){
  return Array.from(document.querySelectorAll('#os-rows tr')).map(tr=>({
    matricule:tr.querySelector('.os-mat-r')?.value||'',
    nom:tr.querySelector('.os-nom-r')?.value||'',
    montant:parseFloat(tr.querySelector('.os-amt-r')?.value)||0,
    date:tr.querySelector('.os-dt-r')?.value||tdy()
  })).filter(p=>p.matricule);
}

function saveOS(eid){
  const mo=$('os-mo')?.value.trim();
  if(!mo)return toast('Saisissez un motif','wn');
  const list=CACHE['os']||[];
  const obj={id:eid||uid(),
    numero:eid?(list.find(x=>x.id===eid)||{}).numero||list.length+1:list.length+1,
    motif:mo,dateEvenement:$('os-dt').value,
    lieu:$('os-li').value,heure:$('os-he').value,
    montantParMembre:parseFloat($('os-mt').value)||0,
    participants:getOSP()};
  if(eid){const i=list.findIndex(x=>x.id===eid);if(i>=0)list[i]=obj;else list.push(obj);}
  else list.push(obj);
  DB.s('os',list);toast('Opération spéciale enregistrée !');
  ST.p.osNew=false;ST.p.osId=null;renderView();
}

function delOS(id){
  if(!confirm('Supprimer cette opération spéciale ?'))return;
  DB.s('os',(CACHE['os']||[]).filter(x=>x.id!==id));
  toast('Supprimé.');ST.p.osId=null;renderView();
}
